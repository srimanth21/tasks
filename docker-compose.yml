version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: task_mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - task-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: task_backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://root:password@mongodb:27017/taskdb?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here
      JWT_EXPIRE: 7d
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - task-network
    command: npm run dev

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: task_frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_WS_URL: ws://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - task-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  task-network:
    driver: bridge
